# LearnWise_AI model serving defaults (override via env vars)
default_backend: local_vllm

local_vllm:
  base_url: http://127.0.0.1:8000/v1
  model: Qwen2.5-7B-Instruct
  api_key: EMPTY
  temperature: 0.7
  max_tokens: 4096

vllm_serve:
  model_path: /root/autodl-tmp/models/Qwen2.5-7B-Instruct
  host: 0.0.0.0
  port: 8000
  gpu_memory_utilization: 0.90
